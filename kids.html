<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>One More Question 👶</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #e8637a;
      --rose-light: #f5a3b3;
      --cream: #fff8f4;
      --gold: #c9a84c;
      --dark: #2a1a1f;
    }

    body {
      min-height: 100vh;
      background-color: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Lato', sans-serif;
      overflow: hidden;
      position: relative;
    }

    .petals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
    }

    .petal {
      position: absolute;
      top: -40px;
      opacity: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotate(0deg); opacity: 0.7; }
      100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
    }

    .card {
      position: relative;
      z-index: 1;
      background: #fff;
      border-radius: 24px;
      padding: 56px 48px 48px;
      max-width: 520px;
      width: calc(100% - 40px);
      text-align: center;
      box-shadow: 0 8px 48px rgba(232, 99, 122, 0.18), 0 2px 8px rgba(0,0,0,0.06);
      border: 1.5px solid rgba(232,99,122,0.15);
    }

    .baby-icon {
      font-size: 3.2rem;
      margin-bottom: 20px;
      display: block;
      animation: bounce 2s ease-in-out infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-8px); }
    }

    .question {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 4.5vw, 1.85rem);
      color: var(--dark);
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .sub {
      margin-top: 14px;
      font-size: 0.95rem;
      color: #b08080;
      font-weight: 300;
      letter-spacing: 0.04em;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--rose-light), transparent);
      margin: 28px auto;
    }

    .btns {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
      align-items: center;
    }

    button {
      font-family: 'Lato', sans-serif;
      font-size: 1rem;
      font-weight: 400;
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      letter-spacing: 0.03em;
      transition: transform 0.2s, box-shadow 0.2s, font-size 0.4s ease, padding 0.4s ease;
    }

    .btn-yes {
      background: linear-gradient(135deg, var(--rose), #d44f68);
      color: #fff;
      box-shadow: 0 4px 20px rgba(232,99,122,0.4);
    }
    .btn-yes:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(232,99,122,0.5); }
    .btn-yes:active { transform: scale(0.98); }

    .btn-no {
      background: #f5eded;
      color: #c08090;
    }
    .btn-no:hover { background: #ede0e0; }

    /* yes screen */
    .yes-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .card.yes-mode .main-content { display: none; }
    .card.yes-mode .yes-screen { display: flex; }

    .yes-emoji { font-size: 4rem; animation: pop 0.5s cubic-bezier(0.175,0.885,0.32,1.275); }
    @keyframes pop { 0% { transform: scale(0); } 100% { transform: scale(1); } }

    .yes-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.4rem, 5vw, 1.9rem);
      color: var(--rose);
    }

    .yes-sub {
      font-size: 0.95rem;
      color: #b08080;
      font-weight: 300;
    }

    #confetti {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
    }

    /* hint text that shows after a few No presses */
    .hint {
      margin-top: 14px;
      font-size: 0.82rem;
      color: var(--rose-light);
      min-height: 18px;
      transition: opacity 0.4s;
      opacity: 0;
    }
    .hint.show { opacity: 1; }
  </style>
</head>
<body>

  <div class="petals" id="petals"></div>
  <canvas id="confetti"></canvas>

  <div class="card" id="card">
    <div class="main-content">
      <span class="baby-icon">👶</span>
      <p class="question">Do you want to have kids with me?</p>
      <p class="sub">No pressure... well, maybe a little. 🥺</p>
      <div class="divider"></div>
      <div class="btns">
        <button class="btn-yes" id="yesBtn">Yes! 🍼</button>
        <button class="btn-no" id="noBtn">No</button>
      </div>
      <p class="hint" id="hint">the Yes button is getting excited 👀</p>
    </div>

    <div class="yes-screen" id="yesScreen">
      <div class="yes-emoji">🥹</div>
      <p class="yes-text">She said YES again! 🎉</p>
      <p class="yes-sub">Our little family is going to be everything. ♥</p>
    </div>
  </div>

  <script>
    // --- floating petals ---
    const petalEl = document.getElementById('petals');
    const symbols = ['🌸','🌺','✨','💕','🌷','❤️','👶'];
    for (let i = 0; i < 18; i++) {
      const p = document.createElement('div');
      p.className = 'petal';
      p.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      p.style.left = Math.random() * 100 + 'vw';
      p.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
      p.style.animationDuration = (6 + Math.random() * 10) + 's';
      p.style.animationDelay = (Math.random() * 12) + 's';
      petalEl.appendChild(p);
    }

    // --- no button grows yes button ---
    const noBtn  = document.getElementById('noBtn');
    const yesBtn = document.getElementById('yesBtn');
    const hint   = document.getElementById('hint');
    const card   = document.getElementById('card');

    let noPresses = 0;
    // base size values
    let baseFontSize = 1;    // rem
    let basePadV    = 14;   // px
    let basePadH    = 36;   // px

    const messages = [
      'the Yes button is getting excited 👀',
      'it really wants you to press it 🥺',
      'okay it\'s basically begging now 😅',
      'just look at it go 🚀',
      'it\'s taken over... resistance is futile 😂',
    ];

    function growYes() {
      noPresses++;
      const scale = 1 + noPresses * 0.22;
      const fs  = baseFontSize * scale;
      const pv  = basePadV * scale;
      const ph  = basePadH * scale;
      yesBtn.style.fontSize = fs + 'rem';
      yesBtn.style.padding  = pv + 'px ' + ph + 'px';
      yesBtn.style.boxShadow = `0 ${4 + noPresses * 3}px ${20 + noPresses * 8}px rgba(232,99,122,${Math.min(0.4 + noPresses * 0.08, 0.85)})`;

      // show hint
      const msg = messages[Math.min(noPresses - 1, messages.length - 1)];
      hint.textContent = msg;
      hint.classList.add('show');

      // after enough presses, hide the No button entirely
      if (noPresses >= 6) {
        noBtn.style.display = 'none';
      }
    }

    noBtn.addEventListener('click', growYes);
    noBtn.addEventListener('touchstart', (e) => { e.preventDefault(); growYes(); }, { passive: false });

    // --- yes button ---
    yesBtn.addEventListener('click', () => {
      card.classList.add('yes-mode');
      noBtn.style.display = 'none';
      launchConfetti();
    });

    // --- confetti ---
    function launchConfetti() {
      const canvas = document.getElementById('confetti');
      const ctx    = canvas.getContext('2d');
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;

      const pieces = Array.from({ length: 120 }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height - canvas.height,
        r: 4 + Math.random() * 6,
        color: ['#e8637a','#f5a3b3','#c9a84c','#f9d87a','#a8d8ea','#fff'][Math.floor(Math.random() * 6)],
        speed: 2 + Math.random() * 4,
        swing: (Math.random() - 0.5) * 2,
        rot: Math.random() * Math.PI * 2,
        rotSpeed: (Math.random() - 0.5) * 0.2,
      }));

      let frame;
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        pieces.forEach(p => {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.rotate(p.rot);
          ctx.fillStyle = p.color;
          ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
          ctx.restore();
          p.y += p.speed;
          p.x += p.swing;
          p.rot += p.rotSpeed;
          if (p.y > canvas.height) { p.y = -20; p.x = Math.random() * canvas.width; }
        });
        frame = requestAnimationFrame(draw);
      }
      draw();
      setTimeout(() => { cancelAnimationFrame(frame); ctx.clearRect(0, 0, canvas.width, canvas.height); }, 6000);
    }
  </script>
</body>
</html>
